name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build binaries for all platforms (runs on tag push and manual trigger)
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x64
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-arm64
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: macos-x64
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: macos-arm64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Build binary
      run: cargo build --release --target ${{ matrix.target }} --features cli -p cidr-aggregator
    - uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.platform }}
        path: target/${{ matrix.target }}/release/cidr-aggregator${{ matrix.ext }}

  # Build Python wheel (runs on tag push and manual trigger)
  build-wheel:
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Place binaries
      run: |
        cd python
        for dir in ../artifacts/binary-*; do
          platform=$(basename "$dir" | sed 's/binary-//')
          mkdir -p "cidr_aggregator/_bin/$platform"
          ext=""
          [[ "$platform" == windows-* ]] && ext=".exe"
          cp "$dir/cidr-aggregator$ext" "cidr_aggregator/_bin/$platform/"
        done
        ls -R cidr_aggregator/_bin/
    - name: Build wheel
      run: |
        pip install build
        cd python
        python -m build --wheel
    - uses: actions/upload-artifact@v4
      with:
        name: python-wheel
        path: python/dist/*.whl

  # Create GitHub release (only on tag push)
  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-cli
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Prepare release assets
      run: |
        mkdir release
        for dir in artifacts/binary-*; do
          platform=$(basename "$dir" | sed 's/binary-//')
          ext=""
          [[ "$platform" == windows-* ]] && ext=".exe"
          cp "$dir/cidr-aggregator$ext" "release/cidr-aggregator-${platform}${ext}"
        done
    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        generate_release_notes: true

  # Publish to PyPI (only on tag push)
  pypi-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # for trusted publishing
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: python-wheel
        path: dist
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
