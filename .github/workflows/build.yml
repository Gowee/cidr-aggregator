name: Build

on:
  push:
    branches:
      - '*'
      - '!pages'
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-main:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cargo --version
        cargo build --all-features --verbose
    - name: Test
      run: cargo test --all-features --verbose
    - name: Clippy
      run: cargo clippy --all-features --verbose -- -D warnings
    - name: Check Format
      run: cargo fmt -- --check

  build-web:
    needs: build-main
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Init web
      working-directory: web/
      run: |
        node --version
        yarn --version
        yarn install
    - name: Build
      working-directory: web/
      run: yarn build

  build-cli:
    needs: build-main
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Build binary
      run: cargo build --release --target ${{ matrix.target }} --features cli -p cidr-aggregator
    - name: Test binary
      shell: bash
      run: |
        EXT=""
        [[ "${{ matrix.platform }}" == windows-* ]] && EXT=".exe"
        ./target/${{ matrix.target }}/release/cidr-aggregator$EXT --help
    - uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.platform }}
        path: |
          target/${{ matrix.target }}/release/cidr-aggregator
          target/${{ matrix.target }}/release/cidr-aggregator.exe
