name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-main:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cargo --version
        cargo build --all-features --verbose
    - name: Test
      run: cargo test --all-features --verbose
    - name: Clippy
      run: cargo clippy --all-features --verbose -- -D warnings
    - name: Check Format
      run: cargo fmt -- --check

  build-cli:
    needs: build-main
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            platform: linux-x64
            ext: ""
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            platform: linux-arm64
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: macos-x64
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: macos-arm64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Install cross (for musl Linux)
      if: contains(matrix.target, 'linux-musl')
      run: cargo install cross --git https://github.com/cross-rs/cross
    - name: Build binary
      shell: bash
      run: |
        if [[ "${{ matrix.target }}" == *linux-musl* ]]; then
          cross build --release --target ${{ matrix.target }} --features cli -p cidr-aggregator
        else
          cargo build --release --target ${{ matrix.target }} --features cli -p cidr-aggregator
        fi
    - uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.platform }}
        path: target/${{ matrix.target }}/release/cidr-aggregator${{ matrix.ext }}

  build-wheel:
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Place binaries
      run: |
        cd python
        for dir in ../artifacts/binary-*; do
          platform=$(basename "$dir" | sed 's/binary-//')
          mkdir -p "cidr_aggregator/_bin/$platform"
          ext=""
          [[ "$platform" == windows-* ]] && ext=".exe"
          cp "$dir/cidr-aggregator$ext" "cidr_aggregator/_bin/$platform/"
          chmod +x "cidr_aggregator/_bin/$platform/cidr-aggregator$ext"
        done
        ls -R cidr_aggregator/_bin/
    - name: Build wheel
      run: |
        pip install build
        cd python
        python -m build --wheel
    - uses: actions/upload-artifact@v4
      with:
        name: python-wheel
        path: python/dist/*.whl

  # --- Release jobs (tag push only) ---

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-cli
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Prepare release assets
      run: |
        mkdir release
        for dir in artifacts/binary-*; do
          platform=$(basename "$dir" | sed 's/binary-//')
          ext=""
          [[ "$platform" == windows-* ]] && ext=".exe"
          cp "$dir/cidr-aggregator$ext" "release/cidr-aggregator-${platform}${ext}"
        done
    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        generate_release_notes: true

  pypi-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: python-wheel
        path: dist
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
